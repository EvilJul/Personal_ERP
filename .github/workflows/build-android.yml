name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js standalone
        run: npx next build
        env:
          NODE_ENV: production
          BUILD_TARGET: capacitor

      - name: Copy standalone server
        run: |
          mkdir -p android/app/src/main/assets/www
          cp -r .next/standalone/* android/app/src/main/assets/www/
          cp -r public android/app/src/main/assets/www/

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: personal-erp-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Build Release APK (optional)
        run: |
          cd android
          ./gradlew assembleRelease
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: personal-erp-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
