apply plugin: 'com.android.application'

android {
    namespace "com.personal_erp.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.personal_erp.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern '!.git:!.gitignore:!.idea:!.gradle:!src:!.svn:!.git:!.DS_Store:!.env:*.hprof'
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidXAppCompatVersion"
    implementation "com.google.android.material:material:$androidXMaterialVersion"
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
}

try {
    def syncScript = file('../node_modules/@capacitor/android/capacitor/build.gradle')
    if (syncScript.exists()) {
        apply from: syncScript
    }
} catch (Exception e) {
    logger.info("Unable to apply sync script: ${e.message}")
}
